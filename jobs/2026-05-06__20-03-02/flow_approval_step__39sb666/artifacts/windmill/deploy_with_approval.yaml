summary: "Deploy a service with human approval"
value:
  modules:
    - id: prepare
      value:
        type: script
        path: f/scripts/prepare_deployment
        input_transforms:
          service:
            type: static
            value: "api-server"
          version:
            type: static
            value: "v1.2.3"
          environment:
            type: static
            value: "production"
    - id: approval
      value:
        type: flow
        path: hub/0/approval
        input_transforms: {}
    - id: deploy
      value:
        type: script
        path: f/scripts/execute_deployment
        input_transforms:
          deploy_command:
            type: javascript
            expr: "results.prepare.deploy_command"
