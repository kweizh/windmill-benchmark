summary: "Fetch, enrich, and export users to CSV"
value:
  modules:
    - id: fetch
      value:
        type: script
        path: f/scripts/fetch_users
        input_transforms:
          limit:
            type: static
            value: 5
    - id: enrich
      value:
        type: script
        path: f/scripts/enrich_users
        input_transforms:
          users:
            type: javascript
            expr: "results.fetch"
    - id: export
      value:
        type: script
        path: f/scripts/export_csv
        input_transforms:
          records:
            type: javascript
            expr: "results.enrich"
