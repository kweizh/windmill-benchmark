summary: "Compute text statistics in parallel"
value:
  modules:
    - id: stats
      value:
        type: branchall
        parallel: true
        branches:
          - summary: "Word count"
            modules:
              - id: words
                value:
                  type: script
                  path: f/scripts/compute_word_count
                  input_transforms:
                    text:
                      type: static
                      value: "Hello World\nThis is Windmill"
          - summary: "Char count"
            modules:
              - id: chars
                value:
                  type: script
                  path: f/scripts/compute_char_count
                  input_transforms:
                    text:
                      type: static
                      value: "Hello World\nThis is Windmill"
          - summary: "Line count"
            modules:
              - id: lines
                value:
                  type: script
                  path: f/scripts/compute_line_count
                  input_transforms:
                    text:
                      type: static
                      value: "Hello World\nThis is Windmill"
