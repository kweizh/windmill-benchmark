summary: "Greet and wrap a message"
value:
  modules:
    - id: a
      value:
        type: script
        path: f/scripts/generate_message
        input_transforms:
          name:
            type: static
            value: "Windmill"
    - id: b
      value:
        type: script
        path: f/scripts/wrap_message
        input_transforms:
          message:
            type: javascript
            expr: "results.a.message"