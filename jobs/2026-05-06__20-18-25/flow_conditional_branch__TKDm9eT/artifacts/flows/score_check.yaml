summary: "Route based on score pass/fail"
value:
  modules:
    - id: a
      value:
        type: script
        path: f/scripts/check_score
        input_transforms:
          score:
            type: static
            value: 75
    - id: b
      value:
        type: branchone
        branches:
          - summary: "Passed"
            expr: "results.a.passed === true"
            modules:
              - id: c
                value:
                  type: script
                  path: f/scripts/on_pass
                  input_transforms:
                    score:
                      type: javascript
                      expr: "results.a.score"
        default:
          - id: d
            value:
              type: script
              path: f/scripts/on_fail
              input_transforms:
                score:
                  type: javascript
                  expr: "results.a.score"