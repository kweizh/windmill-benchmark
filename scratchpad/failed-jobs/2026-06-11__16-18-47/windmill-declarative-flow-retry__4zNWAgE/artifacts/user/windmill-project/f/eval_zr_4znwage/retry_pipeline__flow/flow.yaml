summary: Two-step pipeline with exponential retry on the first module
description: A flaky step that retries with exponential backoff until it
  succeeds, followed by a finalize step.
value:
  modules:
    - id: flaky
      value:
        type: script
        input_transforms:
          attempt_marker_path:
            type: static
            value: f/eval_zr_4znwage/flaky_counter
        path: f/eval_zr_4znwage/flaky_step/flaky_step
      retry:
        exponential:
          attempts: 4
          multiplier: 2
          seconds: 1
    - id: finalize
      value:
        type: script
        input_transforms:
          previous:
            type: javascript
            expr: results.flaky
        path: f/eval_zr_4znwage/finalize/finalize