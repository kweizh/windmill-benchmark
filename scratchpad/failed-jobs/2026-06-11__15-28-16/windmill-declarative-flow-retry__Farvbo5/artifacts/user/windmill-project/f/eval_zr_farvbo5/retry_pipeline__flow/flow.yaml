summary: Retry pipeline flow
description: A flow demonstrating exponential retry
value:
  modules:
    - id: flaky
      value:
        type: script
        input_transforms:
          attempt_marker_path:
            type: static
            value: f/eval_zr_farvbo5/flaky_counter
        path: f/eval_zr_farvbo5/flaky_step
      retry:
        constant:
          attempts: 0
          seconds: 0
        exponential:
          attempts: 4
          multiplier: 2
          random_factor: null
          seconds: 1
    - id: finalize
      value:
        type: script
        input_transforms:
          previous:
            type: javascript
            expr: results.flaky
        path: f/eval_zr_farvbo5/finalize
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order: []
  properties: {}
  required: []
