summary: "Error handler flow that demonstrates failure handling"
description: "A flow that throws when should_fail is true and handles the error with a failure_module"
schema:
  type: object
  properties:
    should_fail:
      type: boolean
      description: "When true, the inner script will raise an error"
  required:
    - should_fail
value:
  modules:
    - id: maybe_fail
      value:
        type: rawscript
        content: |
          export async function main(should_fail: boolean) {
            if (should_fail) {
              throw new Error("Intentional failure triggered");
            }
            return { success: true };
          }
        language: bun
        input_transforms:
          should_fail:
            type: javascript
            expr: "flow_input.should_fail"
  failure_module:
    id: failure
    value:
      type: rawscript
      content: |
        export async function main(error: any) {
          return { handled: true, reason: error.message };
        }
      language: bun
      input_transforms: {}