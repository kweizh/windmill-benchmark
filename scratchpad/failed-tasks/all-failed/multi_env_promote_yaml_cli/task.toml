version = "1.0"

[metadata]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_API_KEY = "${POCHI_API_KEY}"
WMILL_BASE_URL = "${WMILL_BASE_URL}"
WMILL_TOKEN = "${WMILL_TOKEN}"
WMILL_STAGING_WORKSPACE_ID = "${WMILL_STAGING_WORKSPACE_ID}"
WMILL_PROD_WORKSPACE_ID = "${WMILL_PROD_WORKSPACE_ID}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
WMILL_BASE_URL = "${WMILL_BASE_URL}"
WMILL_TOKEN = "${WMILL_TOKEN}"
WMILL_STAGING_WORKSPACE_ID = "${WMILL_STAGING_WORKSPACE_ID}"
WMILL_PROD_WORKSPACE_ID = "${WMILL_PROD_WORKSPACE_ID}"

[solution.env]

